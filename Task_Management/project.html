<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Task Management System</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap%22 rel="stylesheet"/>
  <style>
    :root {
      --bg:       #0f0f13;
      --surface:  #17171f;
      --card:     #1e1e2a;
      --border:   #2c2c3e;
      --accent:   #7c6aff;
      --accent2:  #ff6a9d;
      --text:     #e8e8f0;
      --muted:    #6b6b82;
      --success:  #4ade80;
      --danger:   #ff5f6d;
      --warn:     #fbbf24;
      --star:     #f59e0b;
      --star-bg:  rgba(245,158,11,.12);
      --radius:   14px;
      --shadow:   0 8px 32px rgba(0,0,0,.45);
    }
    [data-theme="light"] {
      --bg:       #f0f0f7;
      --surface:  #e4e4f0;
      --card:     #ffffff;
      --border:   #d0d0e0;
      --text:     #18181f;
      --muted:    #8888a0;
      --shadow:   0 4px 20px rgba(0,0,0,.1);
      --star-bg:  rgba(245,158,11,.10);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px 100px;
      transition: background .3s, color .3s;
    }
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(130px);
      pointer-events: none;
      z-index: 0;
      transition: opacity .4s;
    }
    body::before { width: 540px; height: 540px; background: rgba(124,106,255,.13); top: -120px; left: -100px; }
    body::after  { width: 400px; height: 400px; background: rgba(255,106,157,.10); bottom: -80px; right: -80px; }
    [data-theme="light"] body::before { opacity: .4; }
    [data-theme="light"] body::after  { opacity: .3; }
    .container { position: relative; z-index: 1; width: 100%; max-width: 600px; }
 
    /* HEADER */
    header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 28px; animation: fadeDown .45s ease both; }
    .logo { font-family: 'DM Serif Display', serif; font-size: 2.2rem; letter-spacing: -.5px; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .logo-sub { color: var(--muted); font-size: .82rem; margin-top: 3px; }
    .phase-badge { display: inline-block; background: linear-gradient(135deg,var(--accent),var(--accent2)); color: #fff; font-size: .65rem; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; border-radius: 6px; padding: 3px 8px; margin-left: 10px; vertical-align: middle; }
    .header-actions { display: flex; gap: 8px; align-items: center; margin-top: 4px; }
    .btn-sm { background: var(--card); border: 1px solid var(--border); color: var(--muted); border-radius: 8px; padding: 6px 12px; font-family: 'DM Sans', sans-serif; font-size: .78rem; cursor: pointer; transition: all .2s; white-space: nowrap; }
    .btn-sm:hover { border-color: var(--accent); color: var(--accent); }
 
    /* PROGRESS */
    .progress-wrap { margin-bottom: 24px; animation: fadeDown .45s .05s ease both; }
    .progress-label { display: flex; justify-content: space-between; font-size: .78rem; color: var(--muted); margin-bottom: 7px; }
    .progress-track { background: var(--border); border-radius: 50px; height: 7px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 50px; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width .5s cubic-bezier(.4,0,.2,1); width: 0%; }
 
    /* STATS */
    .stats { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 24px; animation: fadeDown .45s .08s ease both; }
    .stat { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; font-size: .75rem; color: var(--muted); transition: border-color .2s; }
    .stat:hover { border-color: rgba(124,106,255,.35); }
    .stat span { display: block; font-size: 1.5rem; font-weight: 700; color: var(--text); margin-bottom: 2px; }
    .stat.danger-stat span { color: var(--danger); }
    .stat.star-stat { border-color: rgba(245,158,11,.25); background: linear-gradient(135deg, var(--card), rgba(245,158,11,.04)); }
    .stat.star-stat:hover { border-color: rgba(245,158,11,.5); }
    .stat.star-stat span { color: var(--star); }
 
    /* SEARCH */
    .search-wrap { position: relative; margin-bottom: 16px; animation: fadeDown .45s .12s ease both; }
    .search-wrap svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
    #searchInput { width: 100%; background: var(--card); border: 1px solid var(--border); color: var(--text); border-radius: 10px; padding: 10px 14px 10px 38px; font-family: 'DM Sans', sans-serif; font-size: .9rem; outline: none; transition: border-color .2s, box-shadow .2s; }
    #searchInput:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(124,106,255,.12); }
    #searchInput::placeholder { color: var(--muted); }
 
    /* ADD CARD */
    .add-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 20px; box-shadow: var(--shadow); animation: fadeDown .45s .15s ease both; }
    .add-card-title { font-size: .75rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); margin-bottom: 14px; }
    .input-row { display: flex; gap: 10px; margin-bottom: 10px; }
    .input-row input { flex: 1; }
    input[type="text"], input[type="datetime-local"], select { background: var(--surface); border: 1px solid var(--border); color: var(--text); border-radius: 10px; padding: 10px 14px; font-family: 'DM Sans', sans-serif; font-size: .88rem; outline: none; transition: border-color .2s, box-shadow .2s; width: 100%; }
    input:focus, select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(124,106,255,.12); }
    input[type="datetime-local"] { color-scheme: dark; }
    [data-theme="light"] input[type="datetime-local"] { color-scheme: light; }
    select option { background: var(--card); }
    .add-row2 { display: flex; gap: 10px; }
    .add-row2 select { flex: 1; }
    .add-row2 input[type="datetime-local"] { flex: 1.6; }
    select#prioritySelect option[value="high"]   { color: var(--danger); }
    select#prioritySelect option[value="medium"] { color: var(--warn);   }
    select#prioritySelect option[value="low"]    { color: var(--success);}
    .btn-add { background: linear-gradient(135deg, var(--accent), #9b59f5); color: #fff; border: none; border-radius: 10px; padding: 10px 20px; font-family: 'DM Sans', sans-serif; font-size: .9rem; font-weight: 600; cursor: pointer; white-space: nowrap; transition: opacity .2s, transform .15s; flex-shrink: 0; }
    .btn-add:hover { opacity: .88; transform: translateY(-1px); }
    .btn-add:active { transform: translateY(0); }
 
    /* TOOLBAR */
    .toolbar { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; animation: fadeDown .45s .2s ease both; }
    .filters { display: flex; gap: 6px; flex-wrap: wrap; }
    .filter-btn { background: var(--card); border: 1px solid var(--border); color: var(--muted); border-radius: 8px; padding: 5px 13px; font-family: 'DM Sans', sans-serif; font-size: .78rem; cursor: pointer; transition: all .2s; }
    .filter-btn.active, .filter-btn:hover { background: var(--accent); border-color: var(--accent); color: #fff; }
    .sort-wrap { display: flex; align-items: center; gap: 8px; }
    .sort-wrap label { font-size: .78rem; color: var(--muted); white-space: nowrap; }
    #sortSelect { background: var(--card); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 5px 10px; font-family: 'DM Sans', sans-serif; font-size: .78rem; outline: none; cursor: pointer; width: auto; }
 
    /* TASK LIST */
    #taskList { list-style: none; display: flex; flex-direction: column; gap: 8px; }
    .task-item { background: var(--card); border: 1px solid var(--border); border-left: 4px solid transparent; border-radius: var(--radius); padding: 13px 14px; display: flex; align-items: flex-start; gap: 11px; transition: border-color .2s, opacity .3s, transform .15s, box-shadow .2s; cursor: grab; animation: slideIn .28s ease both; }
    .task-item:hover { border-color: rgba(124,106,255,.4); box-shadow: 0 4px 16px rgba(0,0,0,.25); }
    .task-item.completed { opacity: .5; }
    .task-item.dragging  { opacity: .4; transform: scale(.98); cursor: grabbing; }
    .task-item.drag-over { border-color: var(--accent) !important; box-shadow: 0 0 0 2px rgba(124,106,255,.3); }
    .task-item.p-high   { border-left-color: var(--danger); }
    .task-item.p-medium { border-left-color: var(--warn);   }
    .task-item.p-low    { border-left-color: var(--success);}
    .drag-handle { flex-shrink: 0; color: var(--border); margin-top: 3px; cursor: grab; transition: color .2s; }
    .task-item:hover .drag-handle { color: var(--muted); }
 
    /* TOGGLE COLUMN: checkbox + star stacked */
    .toggle-col { display: flex; flex-direction: column; align-items: center; gap: 6px; flex-shrink: 0; padding-top: 1px; }
 
    /* CHECKBOX */
    .checkbox-wrap { flex-shrink: 0; width: 20px; height: 20px; cursor: pointer; }
    .checkbox-wrap input[type="checkbox"] { display: none; }
    .checkbox-wrap .box { width: 20px; height: 20px; border: 2px solid var(--border); border-radius: 6px; display: flex; align-items: center; justify-content: center; transition: all .2s; }
    .checkbox-wrap input:checked + .box { background: var(--success); border-color: var(--success); }
    .checkbox-wrap .box svg { display: none; }
    .checkbox-wrap input:checked + .box svg { display: block; }
 
    /* STAR BUTTON */
    .star-btn { width: 20px; height: 20px; background: none; border: none; cursor: default; display: flex; align-items: center; justify-content: center; padding: 0; position: relative; flex-shrink: 0; }
    .star-btn svg { width: 16px; height: 16px; transition: transform .3s cubic-bezier(.34,1.56,.64,1), fill .3s, filter .3s; }
    .star-btn.earned svg { fill: var(--star); stroke: var(--star); filter: drop-shadow(0 0 5px rgba(245,158,11,.7)); }
    .star-btn:not(.earned) svg { fill: none; stroke: var(--border); }
 
    @keyframes starPop {
      0%   { transform: scale(0) rotate(-20deg); opacity: 0; }
      55%  { transform: scale(1.6) rotate(8deg); opacity: 1; }
      75%  { transform: scale(.88) rotate(-3deg); }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }
    .star-btn.just-earned svg { animation: starPop .5s cubic-bezier(.34,1.56,.64,1) both; }
 
    /* Floating +1 star burst */
    .star-burst { position: fixed; font-size: .82rem; font-weight: 700; color: var(--star); pointer-events: none; z-index: 9999; animation: burstFloat 1s ease forwards; white-space: nowrap; text-shadow: 0 1px 8px rgba(245,158,11,.5); }
    @keyframes burstFloat {
      0%   { opacity: 1; transform: translateY(0) scale(1); }
      60%  { opacity: 1; }
      100% { opacity: 0; transform: translateY(-60px) scale(1.2); }
    }
 
    /* TASK BODY */
    .task-body { flex: 1; min-width: 0; }
    .task-top { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 4px; }
    .task-text { font-size: .93rem; word-break: break-word; }
    .completed .task-text { text-decoration: line-through; color: var(--muted); }
    .cat-pill { font-size: .68rem; font-weight: 600; padding: 2px 8px; border-radius: 20px; border: 1px solid; white-space: nowrap; letter-spacing: .3px; }
    .cat-work     { color: #60a5fa; border-color: #60a5fa33; background: #60a5fa11; }
    .cat-personal { color: #c084fc; border-color: #c084fc33; background: #c084fc11; }
    .cat-study    { color: #34d399; border-color: #34d39933; background: #34d39911; }
    .cat-health   { color: #fb923c; border-color: #fb923c33; background: #fb923c11; }
    .cat-other    { color: var(--muted); border-color: var(--border); background: transparent; }
    .pri-pill { font-size: .65rem; font-weight: 700; padding: 2px 7px; border-radius: 20px; text-transform: uppercase; letter-spacing: .5px; }
    .pri-high   { color: var(--danger);  background: rgba(255,95,109,.12); }
    .pri-medium { color: var(--warn);    background: rgba(251,191,36,.12); }
    .pri-low    { color: var(--success); background: rgba(74,222,128,.12); }
    .task-due { font-size: .74rem; color: var(--muted); margin-top: 3px; }
    .task-due.overdue { color: var(--danger); font-weight: 500; }
    .task-notes { font-size: .78rem; color: var(--muted); font-style: italic; margin-top: 4px; word-break: break-word; }
 
    /* INLINE EDIT */
    .edit-panel { display: flex; flex-direction: column; gap: 7px; width: 100%; }
    .edit-panel input[type="text"], .edit-panel input[type="datetime-local"], .edit-panel select { background: var(--surface); border: 1px solid var(--accent); color: var(--text); border-radius: 8px; padding: 6px 10px; font-family: 'DM Sans', sans-serif; font-size: .85rem; width: 100%; outline: none; box-shadow: 0 0 0 2px rgba(124,106,255,.10); }
    .edit-panel input[type="datetime-local"] { color-scheme: dark; }
    [data-theme="light"] .edit-panel input[type="datetime-local"] { color-scheme: light; }
    .edit-panel-row { display: flex; gap: 7px; }
    .edit-panel-row select { flex: 1; }
    .edit-panel textarea { background: var(--surface); border: 1px solid var(--accent); color: var(--text); border-radius: 8px; padding: 6px 10px; font-family: 'DM Sans', sans-serif; font-size: .85rem; width: 100%; outline: none; resize: vertical; min-height: 64px; box-shadow: 0 0 0 2px rgba(124,106,255,.10); }
 
    /* ACTION BUTTONS */
    .task-actions { display: flex; gap: 5px; flex-shrink: 0; align-items: center; }
    .btn-icon { background: var(--surface); border: 1px solid var(--border); color: var(--muted); border-radius: 8px; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: .82rem; transition: all .2s; flex-shrink: 0; }
    .btn-icon:hover { border-color: var(--accent); color: var(--accent); }
    .btn-icon.danger:hover { border-color: var(--danger); color: var(--danger); }
    .btn-icon.save:hover   { border-color: var(--success); color: var(--success); }
 
    /* EMPTY STATE */
    .empty-state { text-align: center; padding: 56px 0 40px; color: var(--muted); animation: fadeDown .4s ease both; }
    .empty-state .icon { font-size: 2.8rem; margin-bottom: 12px; }
    .empty-state p { font-size: .88rem; }
 
    /* BULK BAR */
    .bulk-bar { display: none; align-items: center; justify-content: space-between; background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 10px 16px; margin-bottom: 14px; gap: 10px; animation: fadeDown .3s ease both; }
    .bulk-bar.visible { display: flex; }
    .bulk-bar span { font-size: .82rem; color: var(--muted); }
    .bulk-actions { display: flex; gap: 8px; }
 
    /* TOAST */
    #toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 10px 24px; border-radius: 50px; font-size: .84rem; opacity: 0; pointer-events: none; transition: all .3s; z-index: 9999; white-space: nowrap; box-shadow: var(--shadow); }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
 
    /* MODAL */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.55); backdrop-filter: blur(4px); z-index: 500; align-items: center; justify-content: center; animation: fadeIn .2s ease both; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px; width: 90%; max-width: 420px; box-shadow: var(--shadow); animation: scaleIn .25s ease both; }
    .modal h3 { font-family: 'DM Serif Display', serif; font-size: 1.3rem; margin-bottom: 16px; }
    .modal label { display: block; font-size: .8rem; color: var(--muted); margin-bottom: 6px; }
    .modal textarea { width: 100%; background: var(--surface); border: 1px solid var(--border); color: var(--text); border-radius: 10px; padding: 10px 14px; font-family: 'DM Sans', sans-serif; font-size: .88rem; resize: vertical; min-height: 90px; outline: none; }
    .modal textarea:focus { border-color: var(--accent); }
    .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 18px; }
    .btn-cancel { background: var(--surface); border: 1px solid var(--border); color: var(--muted); border-radius: 8px; padding: 8px 18px; font-family: 'DM Sans', sans-serif; font-size: .86rem; cursor: pointer; transition: all .2s; }
    .btn-cancel:hover { border-color: var(--danger); color: var(--danger); }
    .btn-save-modal { background: linear-gradient(135deg, var(--accent), #9b59f5); border: none; color: #fff; border-radius: 8px; padding: 8px 18px; font-family: 'DM Sans', sans-serif; font-size: .86rem; font-weight: 600; cursor: pointer; transition: opacity .2s; }
    .btn-save-modal:hover { opacity: .88; }
 
    /* ANIMATIONS */
    @keyframes fadeDown  { from { opacity:0; transform:translateY(-14px); } to { opacity:1; transform:translateY(0); } }
    @keyframes slideIn   { from { opacity:0; transform:translateX(-12px); } to { opacity:1; transform:translateX(0); } }
    @keyframes fadeIn    { from { opacity:0; } to { opacity:1; } }
    @keyframes scaleIn   { from { opacity:0; transform:scale(.93); } to { opacity:1; transform:scale(1); } }
 
    @media (max-width: 480px) {
      .stats { grid-template-columns: repeat(3,1fr); }
      .add-row2 { flex-direction: column; }
      .toolbar { flex-direction: column; align-items: flex-start; }
    }
    @media (max-width: 360px) {
      .stats { grid-template-columns: repeat(2,1fr); }
    }
 
    /* ═══════════════════════════════════════════════════════════
       COMPLETION POPUP
    ══════════════════════════════════════════════════════════════ */
    .completion-popup-overlay {
      position: fixed;
      inset: 0;
      z-index: 2000;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }
    .completion-popup {
      pointer-events: all;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 32px 44px 28px;
      box-shadow: 0 24px 80px rgba(0,0,0,.55), 0 0 0 1px rgba(255,255,255,.04);
      text-align: center;
      animation: popupIn .42s cubic-bezier(.34,1.56,.64,1) both;
      position: relative;
      max-width: 320px;
      width: 90%;
    }
    .completion-popup.party { border-color: rgba(124,106,255,.4); }
    .completion-popup.duck  { border-color: rgba(251,191,36,.35); }
 
    .completion-popup .popup-emoji {
      font-size: 5rem;
      line-height: 1;
      animation: emojiWiggle .2s ease both;
      display: block;
      filter: drop-shadow(0 4px 16px rgba(0,0,0,.4));
    }
    .completion-popup.party .popup-emoji { animation: emojiPop .6s cubic-bezier(.34,1.56,.64,1) both; }
    .completion-popup.duck  .popup-emoji { animation: duckWobble .8s ease both; }
 
    .completion-popup .popup-title {
      font-family: 'DM Serif Display', serif;
      font-size: 1.4rem;
      color: var(--text);
      margin-top: 4px;
    }
    .completion-popup.party .popup-title { color: var(--accent); }
    .completion-popup.duck  .popup-title { color: var(--warn); }
    .completion-popup.duck.gif-popup .popup-title { font-size: 1.15rem; }
 
    .completion-popup .popup-sub {
      font-size: .84rem;
      color: var(--muted);
      line-height: 1.5;
    }
    .completion-popup .popup-close {
      margin-top: 8px;
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 50px;
      padding: 7px 26px;
      font-family: 'DM Sans', sans-serif;
      font-size: .82rem;
      cursor: pointer;
      transition: all .2s;
    }
    .completion-popup .popup-close:hover { border-color: var(--accent); color: var(--accent); }
    .completion-popup.duck .popup-close:hover { border-color: var(--warn); color: var(--warn); }
 
    /* Confetti pieces (party only) */
    .confetti-piece {
      position: fixed;
      width: 9px; height: 9px;
      border-radius: 2px;
      pointer-events: none;
      z-index: 1999;
      animation: confettiFall var(--fall-dur, 1.1s) var(--fall-delay, 0s) ease-in forwards;
    }
    @keyframes confettiFall {
      0%   { transform: translateY(0) rotate(0deg) scale(1);   opacity: 1; }
      80%  { opacity: 1; }
      100% { transform: translateY(var(--fall-dist, 320px)) rotate(var(--spin, 540deg)) scale(.6); opacity: 0; }
    }
 
    /* Overlay fade-in / popup scale */
    @keyframes popupIn {
      from { opacity: 0; transform: scale(.75) translateY(24px); }
      to   { opacity: 1; transform: scale(1)   translateY(0); }
    }
    @keyframes overlayFadeIn  { from { opacity:0; background:rgba(0,0,0,0); } to { opacity:1; background:rgba(0,0,0,.45); } }
    @keyframes overlayFadeOut { from { opacity:1; } to { opacity:0; } }
 
    .completion-popup-overlay.dim {
      background: rgba(0,0,0,.45);
      backdrop-filter: blur(3px);
      pointer-events: all;
      animation: overlayFadeIn .25s ease both;
    }
    .completion-popup-overlay.closing {
      animation: overlayFadeOut .25s ease both;
    }
    .completion-popup-overlay.closing .completion-popup {
      animation: popupOut .25s ease both;
    }
    @keyframes popupOut {
      from { opacity:1; transform: scale(1); }
      to   { opacity:0; transform: scale(.88) translateY(10px); }
    }
 
    /* Emoji animations */
    @keyframes emojiPop {
      0%   { transform: scale(0) rotate(-15deg); }
      55%  { transform: scale(1.3) rotate(6deg); }
      75%  { transform: scale(.92) rotate(-2deg); }
      100% { transform: scale(1) rotate(0deg); }
    }
    @keyframes duckWobble {
      0%   { transform: scale(0) rotate(8deg); }
      40%  { transform: scale(1.15) rotate(-6deg); }
      60%  { transform: scale(1) rotate(4deg); }
      80%  { transform: scale(1.05) rotate(-2deg); }
      100% { transform: scale(1) rotate(0deg); }
    }
  </style>
</head>
<body>
<div id="toast"></div>
 
<div class="modal-overlay" id="notesModal">
  <div class="modal">
    <h3>📝 Task Notes</h3>
    <label for="notesTextarea">Add a note to this task</label>
    <textarea id="notesTextarea" placeholder="Write any additional details…"></textarea>
    <div class="modal-actions">
      <button class="btn-cancel" id="notesCancelBtn">Cancel</button>
      <button class="btn-save-modal" id="notesSaveBtn">Save Note</button>
    </div>
  </div>
</div>
 
<div class="container">
 
  <header>
    <div>
      <div class="logo">TaskFlow <span class="phase-badge">Phase 2</span></div>
      <div class="logo-sub">Priorities · Categories · Search · Drag-to-reorder</div>
    </div>
    <div class="header-actions">
      <button class="btn-sm" id="exportBtn">⬇ Export JSON</button>
      <button class="btn-sm" id="importBtn">⬆ Import JSON</button>
      <input type="file" id="importFile" accept=".json" style="display:none"/>
      <button class="btn-sm" id="themeBtn">☀ Light</button>
    </div>
  </header>
 
  <div class="progress-wrap">
    <div class="progress-label">
      <span id="progressLabel">Completion</span>
      <span id="progressPct">0%</span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
  </div>
 
  <div class="stats">
    <div class="stat"><span id="statTotal">0</span>Total</div>
    <div class="stat"><span id="statDone">0</span>Done</div>
    <div class="stat danger-stat"><span id="statOverdue">0</span>Overdue</div>
    <div class="stat"><span id="statHigh">0</span>High Priority</div>
    <div class="stat star-stat"><span id="statStars">0</span>⭐ Stars</div>
  </div>
  <div class="search-wrap">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input type="text" id="searchInput" placeholder="Search tasks…"/>
  </div>
 
  <div class="add-card">
    <div class="add-card-title">New Task</div>
    <div class="input-row">
      <input type="text" id="taskInput" placeholder="What needs to be done?"/>
      <button class="btn-add" id="addBtn">+ Add</button>
    </div>
    <div class="add-row2">
      <select id="prioritySelect">
        <option value="medium">⚡ Priority: Medium</option>
        <option value="high">🔴 Priority: High</option>
        <option value="low">🟢 Priority: Low</option>
      </select>
      <select id="categorySelect">
        <option value="other">🏷 Category: Other</option>
        <option value="work">💼 Work</option>
        <option value="personal">🌿 Personal</option>
        <option value="study">📚 Study</option>
        <option value="health">❤️ Health</option>
      </select>
      <input type="datetime-local" id="dueInput"/>
    </div>
  </div>
 
  <div class="bulk-bar" id="bulkBar">
    <span id="bulkLabel">0 selected</span>
    <div class="bulk-actions">
      <button class="btn-sm" id="bulkCompleteBtn">✓ Complete All</button>
      <button class="btn-sm" id="bulkDeleteBtn" style="color:var(--danger)">🗑 Delete All</button>
    </div>
  </div>
 
  <div class="toolbar">
    <div class="filters" id="filterBtns">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="active">Active</button>
      <button class="filter-btn" data-filter="completed">Completed</button>
      <button class="filter-btn" data-filter="overdue">Overdue</button>
      <button class="filter-btn" data-filter="high">🔴 High</button>
    </div>
    <div class="sort-wrap">
      <label for="sortSelect">Sort:</label>
      <select id="sortSelect">
        <option value="newest">Newest</option>
        <option value="oldest">Oldest</option>
        <option value="manual">Manual</option>
        <option value="due">Due Date</option>
        <option value="priority">Priority</option>
        <option value="alpha">A→Z</option>
      </select>
    </div>
  </div>
 
  <ul id="taskList"></ul>
</div>
 
<script>
/* DATA */
function loadTasks() { return JSON.parse(localStorage.getItem('tf2_tasks') || '[]'); }
function saveTasks()  { localStorage.setItem('tf2_tasks', JSON.stringify(tasks)); }
function loadTheme()  { return localStorage.getItem('tf2_theme') || 'dark'; }
 
/* STATE */
let tasks         = loadTasks();
let currentFilter = 'all';
let searchQuery   = '';
let currentSort   = 'newest';
let selectedIds   = new Set();
let notesTargetId = null;
let dragSrcId     = null;
 
/* DOM */
const taskInput       = document.getElementById('taskInput');
const dueInput        = document.getElementById('dueInput');
const addBtn          = document.getElementById('addBtn');
const taskList        = document.getElementById('taskList');
const searchInput     = document.getElementById('searchInput');
const prioritySelect  = document.getElementById('prioritySelect');
const categorySelect  = document.getElementById('categorySelect');
const sortSelect      = document.getElementById('sortSelect');
const toast           = document.getElementById('toast');
const themeBtn        = document.getElementById('themeBtn');
const exportBtn       = document.getElementById('exportBtn');
const importBtn       = document.getElementById('importBtn');
const importFile      = document.getElementById('importFile');
const bulkBar         = document.getElementById('bulkBar');
const bulkLabel       = document.getElementById('bulkLabel');
const bulkCompleteBtn = document.getElementById('bulkCompleteBtn');
const bulkDeleteBtn   = document.getElementById('bulkDeleteBtn');
const notesModal      = document.getElementById('notesModal');
const notesTextarea   = document.getElementById('notesTextarea');
const notesCancelBtn  = document.getElementById('notesCancelBtn');
const notesSaveBtn    = document.getElementById('notesSaveBtn');
 
/* TOAST */
let toastTimer;
function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 2500);
}
 
/* STAR BURST */
function spawnStarBurst(anchorEl) {
  const rect  = anchorEl.getBoundingClientRect();
  const burst = document.createElement('div');
  burst.className   = 'star-burst';
  burst.textContent = '+1 ⭐';
  burst.style.left  = (rect.left + rect.width / 2 - 22) + 'px';
  burst.style.top   = (rect.top - 6) + 'px';
  document.body.appendChild(burst);
  burst.addEventListener('animationend', () => burst.remove());
}
 
/* COMPLETION POPUP */
function showCompletionPopup(isOverdue) {
  const existing = document.querySelector('.completion-popup-overlay');
  if (existing) existing.remove();
  document.querySelectorAll('.confetti-piece').forEach(el => el.remove());
 
  const overlay = document.createElement('div');
  overlay.className = 'completion-popup-overlay dim';
 
  const popup = document.createElement('div');
  popup.className = 'completion-popup ' + (isOverdue ? 'duck' : 'party');
 
  if (isOverdue) {
    popup.innerHTML = `
      <span class="popup-emoji">🦆</span>
      <div class="popup-title">Better late than never…</div>
      <div class="popup-sub">You finished it, but it was overdue.<br>The duck is a little sad. 🐾</div>
      <button class="popup-close">okay okay</button>`;
  } else {
    popup.innerHTML = `
      <span class="popup-emoji">🎉</span>
      <div class="popup-title">Task Crushed!</div>
      <div class="popup-sub">You're on a roll — keep it up! ⭐</div>
      <button class="popup-close">woo-hoo!</button>`;
  }
 
  overlay.appendChild(popup);
  document.body.appendChild(overlay);
  if (!isOverdue) spawnConfetti();
 
  const close = () => {
    overlay.classList.add('closing');
    document.querySelectorAll('.confetti-piece').forEach(el => { el.style.opacity = '0'; el.style.transition = 'opacity .2s'; });
    overlay.addEventListener('animationend', () => { overlay.remove(); document.querySelectorAll('.confetti-piece').forEach(el => el.remove()); }, { once: true });
  };
  const autoClose = setTimeout(close, 3500);
  popup.querySelector('.popup-close').addEventListener('click', () => { clearTimeout(autoClose); close(); });
  overlay.addEventListener('click', e => { if (e.target === overlay) { clearTimeout(autoClose); close(); } });
}
 
function spawnConfetti() {
  const colors = ['#7c6aff','#ff6a9d','#4ade80','#fbbf24','#60a5fa','#f472b6','#34d399'];
  const cx = window.innerWidth / 2, cy = window.innerHeight * 0.38;
  for (let i = 0; i < 56; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.setProperty('--fall-dur',   (.7 + Math.random() * .8) + 's');
    el.style.setProperty('--fall-delay', (Math.random() * .35) + 's');
    el.style.setProperty('--fall-dist',  (200 + Math.random() * 260) + 'px');
    el.style.setProperty('--spin',       (Math.random() > .5 ? '' : '-') + (360 + Math.floor(Math.random() * 360)) + 'deg');
    el.style.background   = colors[Math.floor(Math.random() * colors.length)];
    el.style.left         = (cx + (Math.random() - .5) * 340) + 'px';
    el.style.top          = (cy + (Math.random() - .5) * 120) + 'px';
    el.style.borderRadius = Math.random() > .5 ? '50%' : '2px';
    el.style.width        = (7 + Math.random() * 6) + 'px';
    el.style.height       = (7 + Math.random() * 6) + 'px';
    document.body.appendChild(el);
    el.addEventListener('animationend', () => el.remove());
  }
}
 
/* OVERDUE GIF POPUP */
const SAD_GIFS = [
  'https://media.giphy.com/media/d2lcHJTG5Tscg/giphy.gif',
  'https://media.giphy.com/media/ISOckXUybVfQ4/giphy.gif',
  'https://media.giphy.com/media/OPU6wzx8JrHna/giphy.gif',
  'https://media.giphy.com/media/L95W4wv8nnb9K/giphy.gif',
  'https://media.giphy.com/media/Qdxgf7enMZMgo/giphy.gif',
];
 
function showOverdueGifPopup(taskNames) {
  if (document.querySelector('.completion-popup-overlay')) return;
  const gif   = SAD_GIFS[Math.floor(Math.random() * SAD_GIFS.length)];
  const count = taskNames.length;
  const label = count === 1 ? ('"' + taskNames[0] + '"') : (count + ' tasks');
  const verb  = count === 1 ? 'is' : 'are';
 
  const overlay = document.createElement('div');
  overlay.className = 'completion-popup-overlay dim';
 
  const popup = document.createElement('div');
  popup.className = 'completion-popup duck';
 
  const img = document.createElement('img');
  img.src   = gif;
  img.alt   = 'sad gif';
  img.onerror = function() { this.style.display = 'none'; };
  img.style.cssText = 'width:200px;height:auto;max-height:160px;object-fit:cover;border-radius:12px;box-shadow:0 4px 16px rgba(0,0,0,.35);display:block;margin:8px auto 0';
 
  popup.innerHTML = '<span class="popup-emoji" style="font-size:2.4rem">😢</span>' +
    '<div class="popup-title">Still overdue\u2026</div>' +
    '<div class="popup-sub">' + label + ' ' + verb + ' still waiting for you.</div>';
  popup.appendChild(img);
 
  const closeBtn = document.createElement('button');
  closeBtn.className = 'popup-close';
  closeBtn.style.marginTop = '14px';
  closeBtn.textContent = "i'll do it\u2026 soon";
  popup.appendChild(closeBtn);
 
  overlay.appendChild(popup);
  document.body.appendChild(overlay);
 
  const close = () => {
    overlay.classList.add('closing');
    overlay.addEventListener('animationend', () => overlay.remove(), { once: true });
  };
  const auto = setTimeout(close, 7000);
  closeBtn.addEventListener('click', () => { clearTimeout(auto); close(); });
  overlay.addEventListener('click', e => { if (e.target === overlay) { clearTimeout(auto); close(); } });
}
 
function checkOverdueTasks() {
  const now = new Date();
  const overdue = tasks.filter(t => !t.completed && t.due && new Date(t.due) < now);
  if (overdue.length > 0) showOverdueGifPopup(overdue.map(t => t.text));
}
 
/* THEME */
function applyTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  themeBtn.textContent = t === 'dark' ? '☀ Light' : '🌙 Dark';
  localStorage.setItem('tf2_theme', t);
}
themeBtn.addEventListener('click', () => {
  applyTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
});
applyTheme(loadTheme());
 
/* STATS */
function updateStats() {
  const now     = new Date();
  const done    = tasks.filter(t => t.completed).length;
  const overdue = tasks.filter(t => !t.completed && t.due && new Date(t.due) < now).length;
  const high    = tasks.filter(t => !t.completed && t.priority === 'high').length;
  const stars   = tasks.filter(t => t.starred).length;
  const pct     = tasks.length ? Math.round((done / tasks.length) * 100) : 0;
 
  document.getElementById('statTotal').textContent    = tasks.length;
  document.getElementById('statDone').textContent     = done;
  document.getElementById('statOverdue').textContent  = overdue;
  document.getElementById('statHigh').textContent     = high;
  document.getElementById('statStars').textContent    = stars;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressPct').textContent  = pct + '%';
  document.getElementById('progressLabel').textContent =
    pct === 100 && tasks.length > 0 ? '🎉 All done!' : 'Completion';
}
 
/* FILTER / SORT */
const PRIORITY_ORDER = { high: 0, medium: 1, low: 2 };
function getPriorityRank(task) {
  if (task.completed) return 10; // completed always sink to bottom
  return PRIORITY_ORDER.hasOwnProperty(task.priority) ? PRIORITY_ORDER[task.priority] : 1;
}
function getVisibleTasks() {
  const now = new Date();
  let list  = [...tasks];
  switch (currentFilter) {
    case 'active':    list = list.filter(t => !t.completed); break;
    case 'completed': list = list.filter(t =>  t.completed); break;
    case 'overdue':   list = list.filter(t => !t.completed && t.due && new Date(t.due) < now); break;
    case 'high':      list = list.filter(t => !t.completed && t.priority === 'high'); break;
  }
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    list = list.filter(t => t.text.toLowerCase().includes(q) || (t.notes && t.notes.toLowerCase().includes(q)) || (t.category && t.category.toLowerCase().includes(q)));
  }
  switch (currentSort) {
    case 'oldest':   list.sort((a,b) => a.id - b.id); break;
    case 'due':      list.sort((a,b) => { if (!a.due && !b.due) return 0; if (!a.due) return 1; if (!b.due) return -1; return new Date(a.due) - new Date(b.due); }); break;
    case 'priority': list.sort((a,b) => getPriorityRank(a) - getPriorityRank(b)); break;
    case 'alpha':    list.sort((a,b) => a.text.localeCompare(b.text)); break;
    case 'manual':   break; // preserve tasks array order — drag reordering works here
    default:         list.sort((a,b) => b.id - a.id);
  }
  return list;
}
 
/* RENDER */
function renderTasks() {
  taskList.innerHTML = '';
  const visible = getVisibleTasks();
  if (visible.length === 0) {
    taskList.innerHTML = `<div class="empty-state"><div class="icon">🗂️</div><p>${searchQuery ? 'No tasks match your search.' : 'No tasks here — add one above!'}</p></div>`;
  } else {
    visible.forEach(task => taskList.appendChild(buildTaskEl(task)));
  }
  updateStats();
  updateBulkBar();
}
 
/* SVGs */
const SVG = {
  check: `<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="#0f0f13" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>`,
  edit:  `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`,
  save:  `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`,
  del:   `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>`,
  note:  `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>`,
  drag:  `<svg width="12" height="18" viewBox="0 0 12 18" fill="currentColor"><circle cx="4" cy="3" r="1.5"/><circle cx="8" cy="3" r="1.5"/><circle cx="4" cy="9" r="1.5"/><circle cx="8" cy="9" r="1.5"/><circle cx="4" cy="15" r="1.5"/><circle cx="8" cy="15" r="1.5"/></svg>`,
  star:  `<svg viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`,
};
 
/* BUILD TASK ELEMENT */
function buildTaskEl(task) {
  const now       = new Date();
  const isOverdue = task.due && new Date(task.due) < now && !task.completed;
 
  const li = document.createElement('li');
  li.className  = ['task-item', task.completed ? 'completed' : '', 'p-'+(task.priority||'medium'), selectedIds.has(task.id) ? 'selected' : ''].join(' ').trim();
  li.dataset.id = task.id;
  li.draggable  = true;
 
  // Drag handle
  const dragHandle    = document.createElement('div');
  dragHandle.className = 'drag-handle';
  dragHandle.innerHTML = SVG.drag;
  dragHandle.title     = 'Drag to reorder';
 
  // Toggle column: checkbox above star
  const toggleCol    = document.createElement('div');
  toggleCol.className = 'toggle-col';
 
  const checkWrap    = document.createElement('label');
  checkWrap.className = 'checkbox-wrap';
  checkWrap.innerHTML = `<input type="checkbox" ${task.completed ? 'checked' : ''}/><div class="box">${SVG.check}</div>`;
  checkWrap.querySelector('input').addEventListener('change', (e) => {
    if (e.shiftKey) { toggleSelect(task.id); e.preventDefault(); }
    else toggleComplete(task.id);
  });
 
  const starBtn      = document.createElement('button');
  starBtn.className   = 'star-btn' + (task.starred ? ' earned' : '');
  starBtn.innerHTML   = SVG.star;
  starBtn.title       = task.starred ? '⭐ Star earned for completing this task!' : 'Complete this task to earn a ⭐ star';
  starBtn.disabled    = true; // purely visual indicator
 
  toggleCol.appendChild(checkWrap);
  toggleCol.appendChild(starBtn);
 
  // Body
  const body    = document.createElement('div');
  body.className = 'task-body';
  const topRow    = document.createElement('div');
  topRow.className = 'task-top';
  const textEl    = document.createElement('div');
  textEl.className = 'task-text';
  textEl.textContent = task.text;
  const catPill    = document.createElement('span');
  catPill.className = `cat-pill cat-${task.category || 'other'}`;
  catPill.textContent = task.category ? task.category.charAt(0).toUpperCase() + task.category.slice(1) : 'Other';
  const priPill    = document.createElement('span');
  priPill.className = `pri-pill pri-${task.priority || 'medium'}`;
  priPill.textContent = (task.priority || 'medium').toUpperCase();
  topRow.appendChild(textEl);
  topRow.appendChild(catPill);
  topRow.appendChild(priPill);
  body.appendChild(topRow);
 
  if (task.due) {
    const dueEl    = document.createElement('div');
    dueEl.className = 'task-due' + (isOverdue ? ' overdue' : '');
    dueEl.textContent = (isOverdue ? '⚠ Overdue · ' : '🕐 Due · ') + new Date(task.due).toLocaleString();
    body.appendChild(dueEl);
  }
  if (task.notes) {
    const notesEl    = document.createElement('div');
    notesEl.className = 'task-notes';
    notesEl.textContent = '💬 ' + task.notes;
    body.appendChild(notesEl);
  }
 
  // Actions
  const actions    = document.createElement('div');
  actions.className = 'task-actions';
  const editBtn    = makeIconBtn(SVG.edit, 'Edit task', '');
  const savEditBtn = makeIconBtn(SVG.save, 'Save', 'save');
  savEditBtn.style.display = 'none';
  editBtn.addEventListener('click', () => startEdit(task.id, textEl, editBtn, savEditBtn));
  savEditBtn.addEventListener('click', () => commitEdit(task.id, editBtn, savEditBtn));
  const noteBtn = makeIconBtn(SVG.note, 'Add/edit note', task.notes ? 'save' : '');
  noteBtn.addEventListener('click', () => openNotesModal(task.id));
  const delBtn = makeIconBtn(SVG.del, 'Delete task', 'danger');
  delBtn.addEventListener('click', () => deleteTask(task.id));
  actions.appendChild(editBtn);
  actions.appendChild(savEditBtn);
  actions.appendChild(noteBtn);
  actions.appendChild(delBtn);
 
  li.appendChild(dragHandle);
  li.appendChild(toggleCol);
  li.appendChild(body);
  li.appendChild(actions);
 
  li.addEventListener('dragstart', onDragStart);
  li.addEventListener('dragover',  onDragOver);
  li.addEventListener('dragleave', onDragLeave);
  li.addEventListener('drop',      onDrop);
  li.addEventListener('dragend',   onDragEnd);
  // Prevent drag interference from inner buttons/inputs
  li.querySelectorAll('button, input, select, textarea, label').forEach(child => {
    child.addEventListener('mousedown', e => e.stopPropagation());
  });
 
  return li;
}
 
function makeIconBtn(svg, title, extraClass) {
  const btn = document.createElement('button');
  btn.className = 'btn-icon' + (extraClass ? ' ' + extraClass : '');
  btn.title     = title;
  btn.innerHTML  = svg;
  return btn;
}
 
/* ADD TASK */
function addTask() {
  const text = taskInput.value.trim();
  const due  = dueInput.value;
  if (!text) { showToast('⚠️ Task description cannot be empty.'); taskInput.focus(); return; }
  if (due && new Date(due) <= new Date()) { showToast('⚠️ Please choose a future date & time.'); return; }
  tasks.unshift({ id: Date.now(), text, due: due || '', completed: false, priority: prioritySelect.value, category: categorySelect.value, notes: '', starred: false });
  saveTasks(); renderTasks();
  taskInput.value = ''; dueInput.value = '';
  showToast('✅ Task added!');
}
 
/* TOGGLE COMPLETE — awards/revokes star */
function toggleComplete(id) {
  const task = tasks.find(t => t.id === id);
  if (!task) return;
  const wasOverdue = !task.completed && task.due && new Date(task.due) < new Date();
  task.completed = !task.completed;
  task.starred   = task.completed;
  saveTasks();
  renderTasks();
  if (task.completed) {
    // Trigger star pop animation after DOM update
    requestAnimationFrame(() => {
      const li  = document.querySelector(`.task-item[data-id="${id}"]`);
      const btn = li ? li.querySelector('.star-btn') : null;
      if (btn) {
        btn.classList.add('just-earned');
        spawnStarBurst(btn);
        btn.addEventListener('animationend', () => btn.classList.remove('just-earned'), { once: true });
      }
    });
    // Show party popper or sad duck popup
    showCompletionPopup(wasOverdue);
    showToast(wasOverdue ? '🦆 Completed (overdue).' : '🎉 Done! You earned a ⭐ star!');
  } else {
    showToast('\u21a9 Marked active \u2014 star returned.');
    // If unchecked task is now overdue, show the sad gif
    const nowCheck = new Date();
    if (task.due && new Date(task.due) < nowCheck) {
      setTimeout(() => showOverdueGifPopup([task.text]), 400);
    }
  }
}
 
/* INLINE EDIT */
function startEdit(id, textEl, editBtn, saveBtn) {
  const task = tasks.find(t => t.id === id);
  if (!task) return;
  const pad = n => String(n).padStart(2, '0');
 
  const nameInput = document.createElement('input');
  nameInput.type = 'text'; nameInput.value = task.text; nameInput.placeholder = 'Task name…'; nameInput.dataset.editId = id;
  nameInput.addEventListener('keydown', e => { if (e.key === 'Enter') commitEdit(id, editBtn, saveBtn); });
 
  const dateInput = document.createElement('input');
  dateInput.type = 'datetime-local';
  if (task.due) { const d = new Date(task.due); dateInput.value = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`; }
 
  const priSelect = document.createElement('select');
  [['high','🔴 High'],['medium','⚡ Medium'],['low','🟢 Low']].forEach(([v,l]) => { const o = document.createElement('option'); o.value = v; o.textContent = l; if ((task.priority||'medium') === v) o.selected = true; priSelect.appendChild(o); });
 
  const catSelect = document.createElement('select');
  [['work','💼 Work'],['personal','🌿 Personal'],['study','📚 Study'],['health','❤️ Health'],['other','🏷 Other']].forEach(([v,l]) => { const o = document.createElement('option'); o.value = v; o.textContent = l; if ((task.category||'other') === v) o.selected = true; catSelect.appendChild(o); });
 
  const row = document.createElement('div'); row.className = 'edit-panel-row'; row.appendChild(priSelect); row.appendChild(catSelect);
 
  const notesInput = document.createElement('textarea'); notesInput.placeholder = '💬 Add a note… (optional)'; notesInput.value = task.notes || '';
 
  const panel = document.createElement('div'); panel.className = 'edit-panel'; panel.dataset.editPanelId = id;
  panel.appendChild(nameInput); panel.appendChild(dateInput); panel.appendChild(row); panel.appendChild(notesInput);
 
  const li = document.querySelector(`.task-item[data-id="${id}"]`);
  const body = li ? li.querySelector('.task-body') : null;
  if (body) { body.style.display = 'none'; body.insertAdjacentElement('afterend', panel); }
  nameInput.focus();
  editBtn.style.display = 'none'; saveBtn.style.display = 'flex';
}
 
function commitEdit(id, editBtn, saveBtn) {
  const panel = document.querySelector(`[data-edit-panel-id="${id}"]`);
  if (!panel) return;
  const nameInput = panel.querySelector('input[type="text"]');
  const dateInput = panel.querySelector('input[type="datetime-local"]');
  const selects   = panel.querySelectorAll('select');
  const newText   = nameInput ? nameInput.value.trim() : '';
  if (!newText) { showToast('⚠️ Task name cannot be empty.'); return; }
  const newDue = dateInput ? dateInput.value : '';
  if (newDue && new Date(newDue) <= new Date()) { showToast('⚠️ Due date must be in the future.'); return; }
  const notesInput = panel.querySelector('textarea');
  const task = tasks.find(t => t.id === id);
  if (task) { task.text = newText; task.due = newDue; task.priority = selects[0] ? selects[0].value : task.priority; task.category = selects[1] ? selects[1].value : task.category; task.notes = notesInput ? notesInput.value.trim() : ''; saveTasks(); }
  panel.remove(); renderTasks(); showToast('✏️ Task updated!');
}
 
/* DELETE */
function deleteTask(id) {
  const task = tasks.find(t => t.id === id);
  if (!task || !confirm(`Delete task: "${task.text}"?`)) return;
  tasks = tasks.filter(t => t.id !== id); selectedIds.delete(id); saveTasks(); renderTasks(); showToast('🗑 Task deleted.');
}
 
/* NOTES MODAL */
function openNotesModal(id) {
  notesTargetId = id;
  const task = tasks.find(t => t.id === id);
  notesTextarea.value = task ? (task.notes || '') : '';
  notesModal.classList.add('open'); notesTextarea.focus();
}
notesCancelBtn.addEventListener('click', () => notesModal.classList.remove('open'));
notesModal.addEventListener('click', e => { if (e.target === notesModal) notesModal.classList.remove('open'); });
notesSaveBtn.addEventListener('click', () => {
  const task = tasks.find(t => t.id === notesTargetId);
  if (task) { task.notes = notesTextarea.value.trim(); saveTasks(); }
  notesModal.classList.remove('open'); renderTasks(); showToast('📝 Note saved!');
});
 
/* BULK */
function toggleSelect(id) { if (selectedIds.has(id)) selectedIds.delete(id); else selectedIds.add(id); renderTasks(); }
function updateBulkBar() { const c = selectedIds.size; bulkBar.classList.toggle('visible', c > 0); bulkLabel.textContent = c + ' task' + (c !== 1 ? 's' : '') + ' selected'; }
bulkCompleteBtn.addEventListener('click', () => {
  selectedIds.forEach(id => { const t = tasks.find(t => t.id === id); if (t) { t.completed = true; t.starred = true; } });
  selectedIds.clear(); saveTasks(); renderTasks(); showToast('🎉 All selected done! Stars awarded!');
});
bulkDeleteBtn.addEventListener('click', () => {
  if (!confirm(`Delete ${selectedIds.size} selected task(s)?`)) return;
  tasks = tasks.filter(t => !selectedIds.has(t.id)); selectedIds.clear(); saveTasks(); renderTasks(); showToast('🗑 Selected tasks deleted.');
});
 
/* DRAG & DROP */
function getTaskItem(el) {
  return el.closest('.task-item');
}
function onDragStart(e) {
  const li = getTaskItem(e.currentTarget || this);
  if (!li) return;
  dragSrcId = Number(li.dataset.id);
  li.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', dragSrcId);
}
function onDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  const li = getTaskItem(e.currentTarget || this);
  if (li) li.classList.add('drag-over');
}
function onDragLeave(e) {
  const li = getTaskItem(e.currentTarget || this);
  if (!li) return;
  // Only remove if we're leaving the li itself, not a child
  const related = e.relatedTarget;
  if (!related || !li.contains(related)) li.classList.remove('drag-over');
}
function onDrop(e) {
  e.preventDefault();
  e.stopPropagation();
  const li = getTaskItem(e.currentTarget || this);
  if (!li) return;
  li.classList.remove('drag-over');
  const targetId = Number(li.dataset.id);
  if (!dragSrcId || dragSrcId === targetId) return;
  const si = tasks.findIndex(t => t.id === dragSrcId);
  const ti = tasks.findIndex(t => t.id === targetId);
  if (si === -1 || ti === -1) return;
  const [moved] = tasks.splice(si, 1);
  tasks.splice(ti, 0, moved);
  dragSrcId = null;
  // Switch to manual sort so the reordered position persists visually
  currentSort = 'manual';
  sortSelect.value = 'manual';
  saveTasks();
  renderTasks();
  showToast('\u2195\ufe0f Order saved!');
}
function onDragEnd(e) {
  dragSrcId = null;
  document.querySelectorAll('.task-item').forEach(el => el.classList.remove('dragging', 'drag-over'));
}
 
/* EXPORT / IMPORT */
exportBtn.addEventListener('click', () => {
  const blob = new Blob([JSON.stringify(tasks, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob), a = document.createElement('a');
  a.href = url; a.download = 'taskflow-backup.json'; a.click(); URL.revokeObjectURL(url);
  showToast('📦 Tasks exported!');
});
importBtn.addEventListener('click', () => importFile.click());
importFile.addEventListener('change', () => {
  const file = importFile.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const imported = JSON.parse(e.target.result);
      if (!Array.isArray(imported)) throw new Error();
      const existing = new Set(tasks.map(t => t.id));
      const newTasks = imported.filter(t => !existing.has(t.id));
      tasks = [...newTasks, ...tasks]; saveTasks(); renderTasks();
      showToast(`✅ Imported ${newTasks.length} tasks!`);
    } catch { showToast('❌ Invalid JSON file.'); }
  };
  reader.readAsText(file); importFile.value = '';
});
 
/* FILTERS / SORT / SEARCH */
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active'); currentFilter = btn.dataset.filter; renderTasks();
  });
});
sortSelect.addEventListener('change', () => { currentSort = sortSelect.value; renderTasks(); });
searchInput.addEventListener('input', () => { searchQuery = searchInput.value.trim(); renderTasks(); });
addBtn.addEventListener('click', addTask);
taskInput.addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });
 
/* INIT */
renderTasks();
// Check for overdue tasks on page load, then every 60 minutes
setTimeout(checkOverdueTasks, 1500);
setInterval(checkOverdueTasks, 60 * 60 * 1000);
</script>
